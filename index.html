<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <button class="new-chat" onclick="createNewChat()">+ New Chat</button>
    <div id="history-list"></div>
  </div>

  <!-- Chat -->
  <div class="chat">
    <div class="header">⚡ Neo AI</div>

    <div id="chat-box"></div>

    <div class="input-area">
      <input id="user-input" placeholder="Type your message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
